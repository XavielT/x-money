<div class="x-page transaction-form">
  <!-- Header -->
  <header class="transaction-form-header">
    <button class="transaction-form-back" (click)="cancel()" aria-label="Back">←</button>
    <h1 class="x-page-title">{{ (editId ? 'Edit transaction' : 'New transaction') | t }}</h1>
  </header>

  <!-- Kind toggle -->
  <div class="transaction-form-toggle">
    <button [class.active-expense]="kind() === 'expense'" (click)="setKind('expense')">
      {{ 'Expense' | t }}
    </button>
    <button [class.active-income]="kind() === 'income'" (click)="setKind('income')">
      {{ 'Income' | t }}
    </button>
    <button [class.active-transfer]="kind() === 'transfer'" (click)="setKind('transfer')">
      {{ 'Transfer' | t }}
    </button>
  </div>

  <!-- Amount -->
  <label class="transaction-form-label">{{ 'Amount' | t }}</label>
  <div class="transaction-form-amount">
    <span>{{ txCurrency() === 'USD' ? 'US$' : settings.currency() }}</span>
    <input
      type="number"
      inputmode="decimal"
      step="0.01"
      min="0"
      placeholder="0.00"
      [(ngModel)]="amount"
      name="amount"
    />
  </div>

  <!-- Category grid (not for transfers) -->
  <ng-container *ngIf="kind() !== 'transfer'">
    <label class="transaction-form-label">{{ 'Category' | t }}</label>
    <div class="transaction-form-categories">
      <button
        *ngFor="let cat of categoriesForType()"
        class="transaction-form-category"
        [class.active]="categoryId() === cat.id"
        [style.border-color]="categoryId() === cat.id ? cat.color : ''"
        (click)="selectCategory(cat.id)"
      >
        <span class="transaction-form-category-icon">{{ cat.icon }}</span>
        <span class="transaction-form-category-name">{{ cat.name }}</span>
      </button>
      <button class="transaction-form-category transaction-form-category-new" (click)="toggleNewCategory()">
        <span class="transaction-form-category-icon">➕</span>
        <span class="transaction-form-category-name">{{ 'New' | t }}</span>
      </button>
    </div>

    <!-- Inline new category creator -->
    <div class="transaction-form-newcat x-card" *ngIf="showNewCategory()">
      <input class="x-input" type="text" maxlength="20" [placeholder]="'Category name' | t" [(ngModel)]="newCatName" name="newCatName" />
      <div class="transaction-form-newcat-row">
        <input class="x-input transaction-form-newcat-emoji" type="text" maxlength="4" placeholder="🏷️" [(ngModel)]="newCatIcon" name="newCatIcon" />
        <div class="transaction-form-newcat-emojis">
          <button *ngFor="let emoji of emojiSuggestions" (click)="newCatIcon = emoji">{{ emoji }}</button>
        </div>
      </div>
      <div class="transaction-form-newcat-colors">
        <button
          *ngFor="let color of categoryColors"
          [style.background]="color"
          [class.active]="newCatColor === color"
          (click)="newCatColor = color"
          [attr.aria-label]="'Color ' + color"
        ></button>
      </div>
      <button class="x-btn" [disabled]="!newCatName.trim()" (click)="createCategory()">{{ 'Create category' | t }}</button>
    </div>
  </ng-container>

  <!-- Accounts -->
  <label class="transaction-form-label">{{ (kind() === 'transfer' ? 'From account' : 'Account') | t }}</label>
  <select class="x-input" [ngModel]="accountId" (ngModelChange)="accountChanged($event)" name="accountId">
    <option *ngFor="let acc of accountService.accounts()" [value]="acc.id">
      {{ acc.icon }} {{ acc.name }}{{ acc.last4 ? ' ••' + acc.last4 : '' }}
    </option>
  </select>

  <!-- Currency (dual-currency accounts only) -->
  <ng-container *ngIf="showCurrencyToggle()">
    <label class="transaction-form-label">{{ 'Currency' | t }}</label>
    <div class="transaction-form-toggle">
      <button [class.active-transfer]="txCurrency() === 'DOP'" (click)="setTxCurrency('DOP')">{{ settings.currency() }}</button>
      <button [class.active-transfer]="txCurrency() === 'USD'" (click)="setTxCurrency('USD')">US$</button>
    </div>
  </ng-container>

  <ng-container *ngIf="kind() === 'transfer'">
    <label class="transaction-form-label">{{ 'To account' | t }}</label>
    <select class="x-input" [(ngModel)]="toAccountId" name="toAccountId">
      <option *ngFor="let acc of accountService.accounts()" [value]="acc.id" [disabled]="acc.id === accountId">
        {{ acc.icon }} {{ acc.name }}{{ acc.last4 ? ' ••' + acc.last4 : '' }}
      </option>
    </select>
  </ng-container>

  <!-- Bank fee / tax -->
  <ng-container *ngIf="showFeeField()">
    <label class="transaction-form-label">{{ 'Bank fee / tax (optional)' | t }}</label>
    <div class="transaction-form-fee">
      <input
        class="x-input"
        type="number"
        inputmode="decimal"
        step="0.01"
        min="0"
        placeholder="0.00"
        [(ngModel)]="fee"
        name="fee"
      />
      <button class="transaction-form-fee-btn" (click)="applyDgiiFee()" [disabled]="!amount || amount <= 0">
        {{ settings.taxPercent() | number:'1.2-2' }}%
      </button>
    </div>
    <p class="transaction-form-fee-hint">{{ 'The bank discounts it with the movement (DGII tax, commissions...).' | t }}</p>
  </ng-container>

  <!-- Date -->
  <label class="transaction-form-label">{{ 'Date' | t }}</label>
  <input class="x-input" type="date" [(ngModel)]="date" name="date" />

  <!-- Repeat (only for new transactions) -->
  <ng-container *ngIf="!editId">
    <label class="transaction-form-label">{{ 'Repeat' | t }}</label>
    <select class="x-input" [(ngModel)]="repeat" name="repeat">
      <option value="none">{{ 'Never' | t }}</option>
      <option value="daily">{{ 'Every day' | t }}</option>
      <option value="weekly">{{ 'Every week' | t }}</option>
      <option value="monthly">{{ 'Every month' | t }}</option>
      <option value="yearly">{{ 'Every year' | t }}</option>
    </select>
  </ng-container>

  <!-- Note -->
  <label class="transaction-form-label">{{ 'Note (optional)' | t }}</label>
  <input class="x-input" type="text" maxlength="80" [placeholder]="'e.g. Lunch with friends' | t" [(ngModel)]="note" name="note" />

  <!-- Actions -->
  <div class="transaction-form-actions">
    <button class="x-btn" [disabled]="!isValid()" (click)="save()">
      {{ (editId ? 'Save changes' : (repeat !== 'none' ? 'Add recurring transaction' : 'Add transaction')) | t }}
    </button>
    <button class="x-btn x-btn-danger" *ngIf="editId" (click)="delete()">{{ 'Delete' | t }}</button>
  </div>
</div>
